name: PromptStash — Auto Crawl & Deploy

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Manual trigger
  push:
    branches: [main]

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouMind crawler
        run: python scripts/crawlers/youmind_crawler.py

      - name: Dedupe & insert into DB
        run: python scripts/dedupe/dedupe.py

      - name: Generate static site
        run: python scripts/publisher/generate_site.py

      - name: Copy site to docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp -r outputs/site/* docs/

      - name: Commit & push to trigger GitHub Pages
        run: |
          git config --local user.email "actions@prompt-stash.ai"
          git config --local user.name "PromptStash CI"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update site for GitHub Pages"
          git push
