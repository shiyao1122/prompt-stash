name: PromptStash — Auto Crawl & Deploy

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Manual trigger
  push:
    branches: [main]

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouMind crawler
        run: python scripts/crawlers/youmind_crawler.py

      - name: Run Reddit crawler
        run: python scripts/crawlers/reddit_crawler.py

      - name: Dedupe & insert into DB
        run: python scripts/dedupe/dedupe.py

      - name: Generate static site
        run: python scripts/publisher/generate_site.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: prompt-stash
          directory: outputs/site
          git-domain: github.com
          branch: main
